<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
    <link rel="icon" href="./static/img/vue-logo.png" type="image/png">
    <link rel="manifest" href="manifest.json" />
    <title>vue-awesome-picker</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const localHostPattern = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|::1)$/
      const privateIpPattern = /^(10\.\d+|192\.168\.\d+|172\.(1[6-9]|2\d|3[0-1])\.\d+)\.\d+$/
      const isLocalDev = localHostPattern.test(location.hostname) || privateIpPattern.test(location.hostname)

      if (isLocalDev && navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          return Promise.all(registrations.map((registration) => registration.unregister()))
        }).then(() => {
          if (window.caches) {
            return caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
          }
        }).catch((e) => {
          console.log(`Local SW cleanup failed: ${e}`)
        })
      } else if (navigator.serviceWorker) {
        navigator.serviceWorker.register('./sw.js').then(() => {
          console.log('Service worker registered successfully')
        }).catch((e) => {
          console.log(`Service worker registration failed: ${e}`)
        })
      }
    </script>
    <script src="./dist/vue-awesome-picker.js"></script>
  </body>
</html>
